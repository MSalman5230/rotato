services:
  rotato:
    image: ${ROTATO_IMAGE:-ghcr.io/p32929/openai-gemini-api-key-rotator:latest}
    container_name: rotato
    restart: unless-stopped
    ports:
      - "8990:8990"
    environment:
      - ENV_FILE=/app/data/.env
    volumes:
      - rotato_data:/app/data

volumes:
  rotato_data:
